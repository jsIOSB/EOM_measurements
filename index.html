<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .controls {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-weight: bold;
            color: #00d4ff;
            font-size: 14px;
        }

        select {
            background: #0f3460;
            color: #fff;
            border: 2px solid #00d4ff;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            min-width: 150px;
        }

        select:hover {
            background: #1a4a7a;
        }

        select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.3);
        }

        .filename-display {
            flex: 1;
            padding: 10px 20px;
            background: #0f3460;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            color: #fff;
            min-width: 200px;
        }

        .download-btn {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn:hover {
            background: #00b8e6;
        }

        .image-container {
            background: #16213e;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-width: 100%;
            max-height: 75vh;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <div class="control-group">
                <label for="category">Sweep</label>
                <select id="category">
                    <option value="frequency_sweep">Frequency</option>
                    <option value="input_voltage_sweep">Input Voltage</option>
                </select>
            </div>

            <div class="control-group" id="gain-group">
                <label for="gain">Gain</label>
                <select id="gain">
                    <option value="0V0_gain_voltage">0V0</option>
                    <option value="1V5_gain_voltage">1V5</option>
                </select>
            </div>

            <div class="control-group">
                <label for="file" id="file-label">Frequency</label>
                <select id="file"></select>
            </div>

            <div class="filename-display" id="filename"></div>

            <a class="download-btn" href="all.zip" download>
                ⬇ Download All (.zip)
            </a>
        </div>

        <div class="image-container">
            <img id="preview" src="" alt="Selected image">
        </div>
    </div>

    <script>
        const basePath = "EOM_eval";

        const files = {
            frequency_sweep: {
                "0V0_gain_voltage": [
                    { label: "10MHz", file: "SINE-10MHz-300mV-0V0.png" },
                    { label: "20MHz", file: "SINE-20MHz-300mV-0V0.png" },
                    { label: "40MHz", file: "SINE-40MHz-300mV-0V0.png" },
                    { label: "80MHz", file: "SINE-80MHz-300mV-0V0.png" },
                    { label: "160MHz", file: "SINE-160MHz-300mV-0V0.png" },
                    { label: "1GHz", file: "SINE-1GHz-300mV-0V0.png" }
                ],
                "1V5_gain_voltage": [
                    { label: "10MHz", file: "SINE-10MHz-300mV-1V5.png" },
                    { label: "20MHz", file: "SINE-20MHz-300mV-1V5.png" },
                    { label: "40MHz", file: "SINE-40MHz-300mV-1V5.png" },
                    { label: "80MHz", file: "SINE-80MHz-300mV-1V5.png" },
                    { label: "160MHz", file: "SINE-160MHz-300mV-1V5.png" },
                    { label: "1GHz", file: "SINE-1GHz-300mV-1V5.png" }
                ]
            },
            input_voltage_sweep: {
                "_": [
                    { label: "150mV", file: "SINE-40MHz-150mV-1V5.png" },
                    { label: "300mV", file: "SINE-40MHz-300mV-1V5.png" },
                    { label: "600mV", file: "SINE-40MHz-600mV-1V5.png" },
                    { label: "900mV", file: "SINE-40MHz-900mV-1V5.png" }
                ]
            }
        };

        const categorySelect = document.getElementById('category');
        const gainSelect = document.getElementById('gain');
        const gainGroup = document.getElementById('gain-group');
        const fileSelect = document.getElementById('file');
        const fileLabel = document.getElementById('file-label');
        const preview = document.getElementById('preview');
        const filenameDisplay = document.getElementById('filename');

        function updateFileList() {
            const category = categorySelect.value;
            const gain = category === 'frequency_sweep' ? gainSelect.value : '_';
            const fileList = files[category][gain];

            fileSelect.innerHTML = '';
            fileList.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.file;
                opt.textContent = f.label;
                fileSelect.appendChild(opt);
            });

            updateImage();
        }

        function updateImage() {
            const category = categorySelect.value;
            const gain = category === 'frequency_sweep' ? gainSelect.value : '';
            const file = fileSelect.value;

            let path;
            if (category === 'frequency_sweep') {
                path = `${basePath}/frequency_sweep/${gain}/${file}`;
            } else {
                path = `${basePath}/input_voltage_sweep/${file}`;
            }

            preview.src = path;
            filenameDisplay.textContent = file;
        }

        function updateGainVisibility() {
            const isFrequency = categorySelect.value === 'frequency_sweep';
            gainGroup.style.display = isFrequency ? 'flex' : 'none';
            fileLabel.textContent = isFrequency ? 'Frequency' : 'Input Voltage';
            updateFileList();
        }

        categorySelect.addEventListener('change', updateGainVisibility);
        gainSelect.addEventListener('change', updateFileList);
        fileSelect.addEventListener('change', updateImage);

        updateGainVisibility();
    </script>
</body>
</html>
